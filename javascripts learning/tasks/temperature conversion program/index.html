<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp conversion</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
    <form action="">
        <h1>Temperature conversion</h1>
        <input type="number" name="" id="textBox" value="0">
        <br>
        <input type="radio" name="unit" id="toFahrenheit">
        <label for="toFahrenheit">Celsius → Fahrenheit</label>
        <br>
        <input type="radio" name="unit" id="toCelsius">
        <label for="toCelsius">Fahrenheit → Celsius</label>
        <br>
        <button type="button" id="Submit" onclick="convert()">submit</button>
        <p id="result"></p>
    </form>

     <script src="index.js"></script>
</body>
</html>
